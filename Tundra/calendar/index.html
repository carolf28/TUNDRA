<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Tundra</title>

    <link rel="stylesheet" href="calendar.css">
</head>

<body>

    <div class="page-container">

        <section class="calendar-page">

            <div class="calendar-layout">

                <!-- LEFT SIDE -->
                <div class="calendar-left">

                    <!-- HEADER -->
                    <div class="calendar-header">

                        <h1 id="monthTitle"></h1>

                        <div class="calendar-nav">

                            <button id="prevMonth"><</button>

                            <button id="nextMonth">></button>

                        </div>

                    </div>

                    <!-- WEEKDAYS -->
                    <div class="weekdays">
                        <div>S</div>
                        <div>T</div>
                        <div>Q</div>
                        <div>Q</div>
                        <div>S</div>
                        <div>S</div>
                        <div>D</div>
                    </div>

                    <!-- CALENDAR GRID -->
                    <div id="calendar"></div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="calendar-right">

                    <div id="eventInfo">
                        <p>Click on an event day</p>
                    </div>

                </div>

            </div>

        </section>
        </div>

      <!-- blue event -->
      <div id="secondEvent" class="second-event hidden"></div>



    <script src="calendar.js"></script>

</body>

</html>
